name: ict-scan

on:
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a Telegram delivery-check message instead of scanning"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_alert:
        description: "Ticker to force-alert (e.g. NVDA). Runs live scan; sends real alert if setup found, placeholder if not."
        required: false
        default: ""
        type: string
      force_alert_direction:
        description: "Direction for placeholder alert when no real setup found (long or short)"
        required: false
        default: "long"
        type: choice
        options:
          - "long"
          - "short"
  schedule:
    # Every 20 minutes, 13:30–20:10 UTC, Mon–Fri.
    # Covers 09:30–16:00 ET during DST (standard time: shift cron to 14:30–21:10 UTC).
    - cron: "*/20 13-20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test alert
        if: ${{ github.event.inputs.test_alert == 'true' }}
        run: python main.py --test-alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Force alert (single ticker)
        if: ${{ github.event.inputs.test_alert != 'true' && github.event.inputs.force_alert != '' }}
        run: python main.py --force-alert ${{ github.event.inputs.force_alert }} ${{ github.event.inputs.force_alert_direction }}
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          TRADIER_BASE_URL: https://sandbox.tradier.com/v1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run scanner
        if: ${{ github.event.inputs.test_alert != 'true' && github.event.inputs.force_alert == '' }}
        run: python main.py
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          TRADIER_BASE_URL: https://sandbox.tradier.com/v1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
