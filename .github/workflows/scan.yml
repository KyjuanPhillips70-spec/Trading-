name: ict-scan

on:
  workflow_dispatch:
    inputs:
      test_alert:
        description: "Send a Telegram delivery-check message instead of scanning"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # Every 20 minutes, 13:30–20:10 UTC, Mon–Fri.
    # Covers 09:30–16:00 ET during DST (standard time: shift cron to 14:30–21:10 UTC).
    - cron: "*/20 13-20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send test alert
        if: ${{ github.event.inputs.test_alert == 'true' }}
        run: python main.py --test-alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Run scanner
        if: ${{ github.event.inputs.test_alert != 'true' }}
        run: python main.py
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          TRADIER_BASE_URL: https://sandbox.tradier.com/v1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
